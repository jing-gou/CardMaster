name: Build Backend

on:
  push:
    branches: [main, demo]
    tags: ['v*']
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        uses: bwoodsend/setup-winlibs-action@v1

      - name: Build
        shell: bash
        run: |
          cd backend
          gcc main.c api.c auth.c data.c admin.c student.c mongoose.c -o server.exe -lws2_32 -Wall
          ls -lh server.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardmaster-windows
          path: backend/server.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cd backend
          cc main.c api.c auth.c data.c admin.c student.c mongoose.c -o server -Wall
          ls -lh server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardmaster-macos
          path: backend/server

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p release
          cp artifacts/cardmaster-windows/server.exe release/server-windows.exe
          cp artifacts/cardmaster-macos/server release/server-macos
          chmod +x release/server-macos
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
